<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAESAR CIPHER // TERMINAL</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <!-- Sci-fi Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>

<body>

    <!-- HUD decorative elements -->
    <canvas id="matrix-bg"></canvas>
    <div class="hud-line hud-top"></div>
    <div class="hud-line hud-bottom"></div>
    <div class="hud-crosshair"></div>

    <div class="container">
        <!-- Inner decorative corners -->
        <div class="dec-corner top-left"></div>
        <div class="dec-corner top-right"></div>
        <div class="dec-corner bottom-left"></div>
        <div class="dec-corner bottom-right"></div>

        <h1>CAESAR_CIPHER</h1>

        <p class="subtitle">
            > INITIALIZING ENCRYPTION PROTOCOL... <span class="blink">_</span>
        </p>

        <form method="POST">

            <div class="input-group">
                <label>SYS.INPUT.DATA</label>
                <textarea
                    name="text"
                    placeholder="ENTER DATA STREAM..."
                    required></textarea>
            </div>

            <div class="input-group">
                <label>SYS.SHIFT.VALUE</label>
                <input
                    type="number"
                    name="shift"
                    placeholder="00"
                    required>
            </div>

            <div class="input-group">
                <label>SYS.OPERATION.MODE</label>
                <div class="select-wrapper">
                    <select name="direction">
                        <option value="encode">ENCRYPT_PAYLOAD</option>
                        <option value="decode">DECRYPT_PAYLOAD</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                [ EXECUTE ]
            </button>

        </form>

        {% if result %}
        <div class="result-box">
            <div class="result-header">
                <h2>SYS.OUTPUT.DATA</h2>
                <button class="copy-btn" onclick="copyResult()" title="Copy to clipboard">
                    [ COPY_DATA ]
                </button>
            </div>

            <div class="result" id="result-text">
                {{ result }}
            </div>
        </div>
        {% endif %}

    </div>

    <script>
        function copyResult() {
            const resultText = document.getElementById('result-text').innerText;
            navigator.clipboard.writeText(resultText.trim()).then(() => {
                const copyBtn = document.querySelector('.copy-btn');
                const originalHtml = copyBtn.innerHTML;
                
                copyBtn.innerHTML = '[ COPIED_OK ]';
                copyBtn.classList.add('copied');
                
                setTimeout(() => {
                    copyBtn.innerHTML = originalHtml;
                    copyBtn.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error("Failed to copy: ", err);
            });
        }

        // Matrix Hacker Background
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()_+{}|:"<>?~`=[]\\;,./';
        const fontSize = 28;
        let columns = canvas.width / fontSize;

        let drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(10, 10, 12, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#e24a33'; // Original Crimson/Brown Color
            ctx.font = fontSize + 'px "Share Tech Mono", monospace'; // Removed the 900 bold weight

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = canvas.width / fontSize;
            drops = [];
            for (let x = 0; x < columns; x++) {
                drops[x] = 1;
            }
        });
    </script>
</body>

</html>
