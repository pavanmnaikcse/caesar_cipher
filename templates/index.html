<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caesar Cipher</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/feather-icons"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    
</head>

<body>

    <div class="background">
    </div>

    <div class="container">

        <h1>Caesar Cipher</h1>

        <p class="subtitle">
            Encrypt and decrypt messages securely
        </p>

        <form method="POST">

            <textarea
                name="text"
                placeholder="Type your message here..."
                required></textarea>

            <input
                type="number"
                name="shift"
                placeholder="Enter shift number"
                required>

            <div class="select-wrapper">
                <select name="direction">
                    <option value="encode">Encrypt Message</option>
                    <option value="decode">Decrypt Message</option>
                </select>
                <i data-feather="chevron-down" class="select-icon"></i>
            </div>

            <button type="submit" class="submit-btn">
                Process Message
            </button>

        </form>

        {% if result %}
        <div class="result-box">

            <div class="result-header">
                <h2>Result</h2>
                <button class="copy-btn" onclick="copyResult()" title="Copy to clipboard">
                    <i data-feather="copy"></i> <span>Copy</span>
                </button>
            </div>

            <div class="result" id="result-text">
                {{ result }}
            </div>

        </div>
        {% endif %}

    </div>

    <script>
        feather.replace();

        function copyResult() {
            const resultText = document.getElementById('result-text').innerText;
            navigator.clipboard.writeText(resultText.trim()).then(() => {
                const copyBtn = document.querySelector('.copy-btn');
                const originalHtml = copyBtn.innerHTML;
                
                copyBtn.innerHTML = '<i data-feather="check"></i> <span>Copied!</span>';
                feather.replace();
                copyBtn.classList.add('copied');
                
                setTimeout(() => {
                    copyBtn.innerHTML = originalHtml;
                    feather.replace();
                    copyBtn.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error("Failed to copy: ", err);
            });
        }
    </script>
</body>

</html>
